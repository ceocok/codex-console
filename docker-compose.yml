services:
  webui:
    image: ceocok/codex-console:latest
    container_name: codex-console
    ports:
      - "1455:1455"
    environment:
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: 1455
      WEBUI_ACCESS_PASSWORD: admin123
      DEBUG: "0"
      LOG_LEVEL: info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
